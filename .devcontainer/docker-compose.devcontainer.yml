version: '3.8'

services:
  devcontainer:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    volumes:
      - .:/workspace:cached
      # Cache Maven dependencies between rebuilds
      - maven-cache:/home/vscode/.m2
    # Keep container alive
    command: sleep infinity
    environment:
      # Quarkus datasource — points to the postgres service
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/easymeeting
      - QUARKUS_DATASOURCE_USERNAME=easymeeting
      - QUARKUS_DATASOURCE_PASSWORD=easymeeting
      # Redis
      - QUARKUS_REDIS_HOSTS=redis://redis:6379
      # Mail (MailHog SMTP)
      - QUARKUS_MAILER_HOST=mailhog
      - QUARKUS_MAILER_PORT=1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_healthy

volumes:
  maven-cache:
