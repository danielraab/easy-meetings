# Application Configuration
quarkus.application.name=easy-meetings

# CORS Configuration
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000,https://3000--main--quarkus-nextjs-test--danielraab.coder.draab.at
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=app
quarkus.datasource.password=app123
quarkus.datasource.jdbc.url=jdbc:postgresql://database:5432/app
quarkus.datasource.jdbc.max-size=16
#quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=no-file

# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

# Redis Configuration
quarkus.redis.hosts=redis://redis:6379
quarkus.redis.client-type=standalone
quarkus.redis.timeout=10s

# Cache Configuration
#quarkus.cache.redis.enabled=true
quarkus.cache.redis.expire-after-write=1h

# OIDC Configuration
quarkus.oidc.enabled=false
quarkus.oidc.auth-server-url=https://accounts.google.com
quarkus.oidc.client-id=${OAUTH_CLIENT_ID:your-client-id}
quarkus.oidc.credentials.secret=${OAUTH_CLIENT_SECRET:your-client-secret}
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.cookie-path=/
quarkus.oidc.authentication.redirect-path=/api/auth/callback
quarkus.oidc.authentication.cookie-same-site=lax
quarkus.oidc.token.issuer=https://accounts.google.com

# Security Configuration - Disable authentication requirement by default
quarkus.security.jaxrs.deny-unannotated-endpoints=false
quarkus.http.auth.session.encryption-key=${SESSION_ENCRYPTION_KEY:changeit-must-be-at-least-32-chars}

# Email Configuration
quarkus.mailer.from=noreply@easymeetings.com
quarkus.mailer.host=${SMTP_HOST:mailpit}
quarkus.mailer.port=${SMTP_PORT:1025}
quarkus.mailer.username=${SMTP_USERNAME:}
quarkus.mailer.password=${SMTP_PASSWORD:}
quarkus.mailer.start-tls=OPTIONAL
quarkus.mailer.mock=false

# OpenAPI Configuration
quarkus.smallrye-openapi.path=/api/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api/swagger-ui

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.acme".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Magic Link Configuration
app.magic-link.expiration-minutes=15
app.magic-link.base-url=${APP_BASE_URL:http://localhost:3000}
